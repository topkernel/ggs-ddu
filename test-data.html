<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>知识点数据测试</title>
</head>
<body>
    <h1>知识点数据测试</h1>
    <div id="result"></div>
    
    <script src="knowledge-base-grade7b-chinese-extended.js"></script>
    <script src="knowledge-base-grade7b-math-complete.js"></script>
    <script src="knowledge-base-grade7b-english.js"></script>
    <script src="knowledge-base-grade7b-history.js"></script>
    <script src="knowledge-base-grade7b-geography.js"></script>
    
    <script>
        function ensureArray(data) {
            if (!data) return [];
            if (Array.isArray(data)) return data;
            if (typeof data === 'object') {
                let result = [];
                for (let key in data) {
                    if (Array.isArray(data[key])) {
                        result = result.concat(data[key]);
                    }
                }
                return result;
            }
            return [];
        }
        
        const results = [];
        
        // 测试语文
        const chineseData = ensureArray(grade7bChineseKnowledge);
        results.push(`✅ 语文: ${chineseData.length} 个知识点`);
        
        // 测试数学
        const mathData = grade7bMathKnowledge ? ensureArray(grade7bMathKnowledge.math) : [];
        results.push(`✅ 数学: ${mathData.length} 个知识点`);
        
        // 测试英语
        const englishData = ensureArray(grade7bEnglishKnowledge);
        results.push(`✅ 英语: ${englishData.length} 个知识点`);
        
        // 测试历史
        const historyData = ensureArray(grade7bHistoryKnowledge);
        results.push(`✅ 历史: ${historyData.length} 个知识点`);
        
        // 测试地理
        const geographyData = ensureArray(grade7bGeographyKnowledge);
        results.push(`✅ 地理: ${geographyData.length} 个知识点`);
        
        const total = chineseData.length + mathData.length + englishData.length + historyData.length + geographyData.length;
        results.push(`<br><strong>总计: ${total} 个知识点</strong>`);
        
        document.getElementById('result').innerHTML = results.join('<br>');
        
        // 显示第一个语文知识点示例
        if (chineseData.length > 0) {
            results.push(`<br><br><h3>语文第一个知识点示例：</h3>`);
            results.push(`标题: ${chineseData[0].title}`);
            results.push(`标签: ${chineseData[0].tag}`);
        }
        
        document.getElementById('result').innerHTML = results.join('<br>');
    </script>
</body>
</html>
