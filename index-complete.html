<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7年级下学期知识点学习平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .subject-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: #f5f5f5;
            flex-wrap: wrap;
        }
        .subject-tab {
            padding: 12px 24px;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .subject-tab:hover { transform: translateY(-2px); }
        .subject-tab.active {
            background: #3498db;
            color: white;
        }
        .slide-container {
            padding: 30px;
            min-height: 500px;
        }
        .slide-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .slide-card h3 {
            color: #2c3e50;
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }
        .tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-left: 10px;
        }
        .tag.important { background: #f39c12; color: white; }
        .tag.basic { background: #27ae60; color: white; }
        .formula {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: monospace;
        }
        .example {
            background: #fff9e6;
            border: 2px solid #f39c12;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .answer {
            display: none;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 4px solid #27ae60;
        }
        .answer.show { display: block; }
        .show-answer {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background: #f5f5f5;
        }
        .nav button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .nav button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .stats {
            text-align: center;
            padding: 10px;
            color: #2c3e50;
            font-weight: 600;
        }
        footer {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        ul { margin-left: 25px; margin-bottom: 15px; }
        li { line-height: 1.8; margin-bottom: 8px; }
        h4 { color: #3498db; margin: 20px 0 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 7年级下学期知识点学习平台</h1>
            <p>5门科目 | 209个知识点 | 每页一个知识点</p>
        </header>
        
        <div class="subject-tabs">
            <button class="subject-tab active" onclick="selectSubject('chinese')">📖 语文 <span id="count-chinese">90</span></button>
            <button class="subject-tab" onclick="selectSubject('math')">🔢 数学 <span id="count-math">50</span></button>
            <button class="subject-tab" onclick="selectSubject('english')">🇬🇧 英语 <span id="count-english">24</span></button>
            <button class="subject-tab" onclick="selectSubject('history')">📜 历史 <span id="count-history">25</span></button>
            <button class="subject-tab" onclick="selectSubject('geography')">🌍 地理 <span id="count-geography">20</span></button>
        </div>
        
        <div class="stats" id="stats">当前：语文 第 1/90 页</div>
        
        <div class="slide-container">
            <div class="slide-card" id="slideContent">
                <!-- 内容将在这里显示 -->
            </div>
        </div>
        
        <div class="nav">
            <button id="prevBtn" onclick="navigate(-1)">← 上一页</button>
            <button id="nextBtn" onclick="navigate(1)">下一页 →</button>
        </div>
        
        <footer>
            <p>Made with ❤️ for students | 最后更新：2026年3月</p>
        </footer>
    </div>

    <script src="knowledge-base-grade7b-chinese-extended.js"></script>
    <script src="knowledge-base-grade7b-math-complete.js"></script>
    <script src="knowledge-base-grade7b-english.js"></script>
    <script src="knowledge-base-grade7b-history.js"></script>
    <script src="knowledge-base-grade7b-geography.js"></script>
    
    <script>
        // 数据处理函数
        function ensureArray(data) {
            if (!data) return [];
            if (Array.isArray(data)) return data;
            if (typeof data === 'object') {
                let result = [];
                for (let key in data) {
                    if (Array.isArray(data[key])) {
                        result = result.concat(data[key]);
                    }
                }
                return result;
            }
            return [];
        }
        
        // 合并所有知识点
        const knowledgeBase = {
            chinese: ensureArray(grade7bChineseKnowledge),
            math: grade7bMathKnowledge ? ensureArray(grade7bMathKnowledge.math) : [],
            english: ensureArray(grade7bEnglishKnowledge),
            history: ensureArray(grade7bHistoryKnowledge),
            geography: ensureArray(grade7bGeographyKnowledge)
        };
        
        // 更新计数
        document.getElementById('count-chinese').textContent = knowledgeBase.chinese.length;
        document.getElementById('count-math').textContent = knowledgeBase.math.length;
        document.getElementById('count-english').textContent = knowledgeBase.english.length;
        document.getElementById('count-history').textContent = knowledgeBase.history.length;
        document.getElementById('count-geography').textContent = knowledgeBase.geography.length;
        
        let currentSubject = 'chinese';
        let currentIndex = 0;
        
        function selectSubject(subject) {
            currentSubject = subject;
            currentIndex = 0;
            
            document.querySelectorAll('.subject-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            updateSlide();
        }
        
        function updateSlide() {
            const data = knowledgeBase[currentSubject];
            if (!data || data.length === 0) {
                document.getElementById('slideContent').innerHTML = '<h3>暂无内容</h3><p>该科目知识点正在补充中...</p>';
                return;
            }
            
            const item = data[currentIndex];
            const subjectNames = {
                chinese: '语文',
                math: '数学',
                english: '英语',
                history: '历史',
                geography: '地理'
            };
            
            document.getElementById('stats').textContent = 
                `当前：${subjectNames[currentSubject]} 第 ${currentIndex + 1}/${data.length} 页`;
            
            document.getElementById('slideContent').innerHTML = `
                <h3>${item.title} <span class="tag ${item.tagClass}">${item.tag}</span></h3>
                ${item.content}
            `;
            
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex >= data.length - 1;
        }
        
        function navigate(direction) {
            const data = knowledgeBase[currentSubject];
            const newIndex = currentIndex + direction;
            
            if (newIndex >= 0 && newIndex < data.length) {
                currentIndex = newIndex;
                updateSlide();
            }
        }
        
        function toggleAnswer(btn) {
            const answer = btn.nextElementSibling;
            answer.classList.toggle('show');
            btn.textContent = answer.classList.contains('show') ? '隐藏答案' : '查看答案';
        }
        
        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });
        
        // 初始化
        updateSlide();
        
        // 控制台输出统计信息
        console.log('=== 知识点统计 ===');
        console.log('语文:', knowledgeBase.chinese.length, '个');
        console.log('数学:', knowledgeBase.math.length, '个');
        console.log('英语:', knowledgeBase.english.length, '个');
        console.log('历史:', knowledgeBase.history.length, '个');
        console.log('地理:', knowledgeBase.geography.length, '个');
        console.log('总计:', Object.values(knowledgeBase).reduce((a, b) => a + b.length, 0), '个');
    </script>
</body>
</html>
