<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中小学知识点备忘</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <h1>📚 知识点</h1>
                <span class="stats-text" id="statsText">7下 | 语文 | 1/90</span>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️ 设置</button>
        </div>

        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-group">
                <label class="settings-label">选择年级</label>
                <select class="settings-select" id="gradeSelect">
                    <option value="grade2">2年级下学期</option>
                    <option value="grade7a">7年级上学期</option>
                    <option value="grade7b" selected>7年级下学期</option>
                    <option value="grade8a">8年级上学期</option>
                    <option value="grade8b">8年级下学期</option>
                </select>
            </div>
            <div class="settings-group">
                <label class="settings-label">选择科目</label>
                <select class="settings-select" id="subjectSelect">
                    <option value="chinese" selected>📖 语文</option>
                    <option value="math">🔢 数学</option>
                    <option value="english">🇬🇧 英语</option>
                    <option value="history">📜 历史</option>
                    <option value="geography">🌍 地理</option>
                </select>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content" id="mainContent">
            <div class="slide-card" id="slideContent">
                <!-- 内容将在这里显示 -->
            </div>
        </div>

        <!-- 底部工具栏 -->
        <div class="nav-bar">
            <div class="nav-left">
                <button class="icon-btn" id="prevBtn" onclick="App.navigate(-1)" title="上一页">◀</button>
                <button class="icon-btn" onclick="App.jumpToFirst()" title="第一页">⏮</button>
            </div>

            <div class="nav-center">
                <input type="number" class="jump-input" id="jumpInput" min="1" placeholder="1" title="输入页码">
                <span class="page-info" id="pageInfo">1/90</span>
                <button class="icon-btn" onclick="App.jumpToPage()" title="跳转">↵</button>
            </div>

            <div class="nav-right">
                <button class="icon-btn" onclick="App.jumpToEnd()" title="最后一页">⏭</button>
                <button class="icon-btn" id="nextBtn" onclick="App.navigate(1)" title="下一页">▶</button>
                <span style="color: rgba(255,255,255,0.3); margin: 0 3px;">|</span>
                <button class="icon-btn" onclick="App.doExportMarkdown()" title="保存为Markdown">📝</button>
                <button class="icon-btn" onclick="window.print()" title="打印/保存PDF">🖨</button>
            </div>
        </div>
    </div>

    <!-- 加载知识点库 -->
    <script src="grade7b-chinese.js?v=3"></script>
    <script src="grade7b-math.js?v=2"></script>
    <script src="grade7b-english.js?v=2"></script>
    <script src="grade7b-history.js?v=3"></script>
    <script src="grade7b-geography.js?v=2"></script>

    <!-- 模块化脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
