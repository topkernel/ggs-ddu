<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识点学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部工具栏 - 紧凑 */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            height: 40px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar h1 {
            font-size: 0.95em;
            font-weight: 600;
        }

        .stats-text {
            font-size: 0.8em;
            opacity: 0.9;
            padding: 3px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
        }

        .settings-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .settings-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 42px;
            right: 15px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.25);
            z-index: 1000;
            display: none;
            min-width: 220px;
        }

        .settings-panel.show {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .settings-group {
            margin-bottom: 12px;
        }

        .settings-group:last-child {
            margin-bottom: 0;
        }

        .settings-label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            font-size: 0.85em;
        }

        .settings-select {
            width: 100%;
            padding: 8px;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            background: white;
        }

        /* 主内容区 */
        .main-content {
            margin-top: 40px;
            padding: 20px 25px;
            padding-bottom: 60px;
            touch-action: pan-y;
        }

        /* 知识点卡片 */
        .slide-card {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 25px 35px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
        }

        .slide-card h3 {
            color: #2c3e50;
            font-size: 1.4em;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #3498db;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .tag.important { background: #f39c12; color: white; }
        .tag.basic { background: #27ae60; color: white; }

        .slide-card h4 {
            color: #3498db;
            font-size: 1.1em;
            margin: 18px 0 12px;
        }

        .slide-card h5 {
            color: #2c3e50;
            font-size: 1em;
            margin: 15px 0 10px;
        }

        .slide-card p {
            line-height: 1.75;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .slide-card ul {
            margin-left: 25px;
            margin-bottom: 15px;
        }

        .slide-card li {
            line-height: 1.75;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 0.95em;
        }

        .slide-card strong {
            color: #3498db;
            font-weight: 600;
        }

        .formula {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            line-height: 1.7;
            font-size: 0.95em;
        }

        .advanced {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            margin: 18px 0;
            border-left: 4px solid #3498db;
        }

        .advanced h4 {
            color: #3498db;
            margin-top: 0;
        }

        .example {
            background: #fff9e6;
            border: 2px solid #f39c12;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .answer {
            display: none;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            border-left: 3px solid #27ae60;
            line-height: 1.7;
        }

        .answer.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .show-answer {
            background: #3498db;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .show-answer:hover {
            background: #2980b9;
        }

        /* 底部工具栏 - 紧凑图标 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2c3e50;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            height: 40px;
        }

        .nav-left, .nav-center, .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #3498db;
            transform: scale(1.1);
        }

        .icon-btn:disabled {
            background: rgba(255,255,255,0.1);
            cursor: not-allowed;
            transform: none;
        }

        .icon-btn.active {
            background: #3498db;
        }

        .page-info {
            color: white;
            font-size: 0.85em;
            font-weight: 600;
            padding: 0 10px;
        }

        .jump-input {
            width: 50px;
            padding: 5px 8px;
            border: 2px solid #3498db;
            border-radius: 15px;
            text-align: center;
            font-size: 0.85em;
            background: white;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .toolbar {
                padding: 6px 12px;
                height: 36px;
            }

            .toolbar h1 {
                font-size: 0.85em;
            }

            .stats-text {
                font-size: 0.75em;
            }

            .main-content {
                margin-top: 36px;
                padding: 15px;
                padding-bottom: 55px;
            }

            .slide-card {
                padding: 18px;
            }

            .slide-card h3 {
                font-size: 1.2em;
            }

            .nav-bar {
                padding: 6px 12px;
                height: 36px;
            }

            .icon-btn {
                width: 32px;
                height: 32px;
                font-size: 1em;
            }
        }

        /* 打印样式 */
        @media print {
            .toolbar, .nav-bar, .settings-panel {
                display: none !important;
            }

            .main-content {
                margin: 0;
                padding: 20px;
            }

            .slide-card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <h1>📚 知识点</h1>
                <span class="stats-text" id="statsText">7下 | 语文 | 1/90</span>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">
                ⚙️ 设置
            </button>
        </div>

        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-group">
                <label class="settings-label">选择年级</label>
                <select class="settings-select" id="gradeSelect" onchange="changeGrade()">
                    <option value="grade2">2年级下学期</option>
                    <option value="grade7a">7年级上学期</option>
                    <option value="grade7b" selected>7年级下学期</option>
                    <option value="grade8a">8年级上学期</option>
                    <option value="grade8b">8年级下学期</option>
                </select>
            </div>
            <div class="settings-group">
                <label class="settings-label">选择科目</label>
                <select class="settings-select" id="subjectSelect" onchange="changeSubject()">
                    <option value="chinese" selected>📖 语文 (90)</option>
                    <option value="math">🔢 数学 (50)</option>
                    <option value="english">🇬🇧 英语 (24)</option>
                    <option value="history">📜 历史 (25)</option>
                    <option value="geography">🌍 地理 (20)</option>
                </select>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content" id="mainContent">
            <div class="slide-card" id="slideContent">
                <!-- 内容将在这里显示 -->
            </div>
        </div>

        <!-- 底部工具栏 -->
        <div class="nav-bar">
            <div class="nav-left">
                <button class="icon-btn" id="prevBtn" onclick="navigate(-1)" title="上一页">◀</button>
                <button class="icon-btn" onclick="navigate(-10)" title="后退10页">⏪</button>
                <button class="icon-btn" onclick="jumpToFirst()" title="第一页">⏮</button>
            </div>
            
            <div class="nav-center">
                <input type="number" class="jump-input" id="jumpInput" min="1" placeholder="1" title="输入页码">
                <span class="page-info" id="pageInfo">1/90</span>
                <button class="icon-btn" onclick="jumpToPage()" title="跳转">↵</button>
            </div>
            
            <div class="nav-right">
                <button class="icon-btn" onclick="jumpToEnd()" title="最后一页">⏭</button>
                <button class="icon-btn" onclick="navigate(10)" title="前进10页">⏩</button>
                <button class="icon-btn" id="nextBtn" onclick="navigate(1)" title="下一页">▶</button>
                <span style="color: rgba(255,255,255,0.3); margin: 0 5px;">|</span>
                <button class="icon-btn" onclick="exportMarkdown()" title="保存为Markdown">📝</button>
                <button class="icon-btn" onclick="window.print()" title="打印/保存PDF">🖨</button>
            </div>
        </div>
    </div>

    <!-- 加载知识点库 -->
    <script src="knowledge-base-grade7b-chinese-extended.js"></script>
    <script src="knowledge-base-grade7b-math-complete.js"></script>
    <script src="knowledge-base-grade7b-english.js"></script>
    <script src="knowledge-base-grade7b-history.js"></script>
    <script src="knowledge-base-grade7b-geography.js"></script>

    <script>
        // 数据处理函数
        function ensureArray(data) {
            if (!data) return [];
            if (Array.isArray(data)) return data;
            if (typeof data === 'object') {
                let result = [];
                for (let key in data) {
                    if (Array.isArray(data[key])) {
                        result = result.concat(data[key]);
                    }
                }
                return result;
            }
            return [];
        }

        // 合并所有知识点
        const knowledgeBase = {
            chinese: ensureArray(grade7bChineseKnowledge),
            math: grade7bMathKnowledge ? ensureArray(grade7bMathKnowledge.math) : [],
            english: ensureArray(grade7bEnglishKnowledge),
            history: ensureArray(grade7bHistoryKnowledge),
            geography: ensureArray(grade7bGeographyKnowledge)
        };

        // 状态
        let currentGrade = 'grade7b';
        let currentSubject = 'chinese';
        let currentIndex = 0;
        let settingsVisible = false;
        let touchStartX = 0;
        let touchEndX = 0;

        // 科目名称映射
        const subjectNames = {
            chinese: '语文',
            math: '数学',
            english: '英语',
            history: '历史',
            geography: '地理'
        };

        const gradeNames = {
            grade2: '2下',
            grade7a: '7上',
            grade7b: '7下',
            grade8a: '8上',
            grade8b: '8下'
        };

        // 初始化
        function init() {
            updateSlide();
            
            // 点击页面其他地方关闭设置面板
            document.addEventListener('click', (e) => {
                if (settingsVisible && 
                    !e.target.closest('.settings-panel') && 
                    !e.target.closest('.settings-btn')) {
                    toggleSettings();
                }
            });

            // 触摸滑动支持
            const mainContent = document.getElementById('mainContent');
            
            mainContent.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            mainContent.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
        }

        // 处理滑动
        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    navigate(1); // 左滑，下一页
                } else {
                    navigate(-1); // 右滑，上一页
                }
            }
        }

        // 切换设置面板
        function toggleSettings() {
            settingsVisible = !settingsVisible;
            document.getElementById('settingsPanel').classList.toggle('show', settingsVisible);
        }

        // 从设置面板改变年级
        function changeGrade() {
            currentGrade = document.getElementById('gradeSelect').value;
            // 这里可以加载不同年级的数据
        }

        // 从设置面板改变科目
        function changeSubject() {
            currentSubject = document.getElementById('subjectSelect').value;
            currentIndex = 0;
            updateSlide();
            if (settingsVisible) toggleSettings();
            window.scrollTo(0, 0);
        }

        // 更新幻灯片
        function updateSlide() {
            const data = knowledgeBase[currentSubject];
            
            if (!data || data.length === 0) {
                document.getElementById('slideContent').innerHTML = `
                    <h3>暂无内容 <span class="tag basic">提示</span></h3>
                    <p>该科目知识点正在补充中...</p>
                `;
                return;
            }

            const item = data[currentIndex];
            
            // 更新统计信息
            document.getElementById('statsText').textContent = 
                `${gradeNames[currentGrade]} | ${subjectNames[currentSubject]} | ${currentIndex + 1}/${data.length}`;
            
            document.getElementById('pageInfo').textContent = 
                `${currentIndex + 1}/${data.length}`;
            
            document.getElementById('jumpInput').placeholder = currentIndex + 1;
            
            // 更新内容
            document.getElementById('slideContent').innerHTML = `
                <h3>${item.title} <span class="tag ${item.tagClass}">${item.tag}</span></h3>
                ${item.content}
            `;

            // 更新按钮状态
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex >= data.length - 1;
        }

        // 导航
        function navigate(direction) {
            const data = knowledgeBase[currentSubject];
            const newIndex = currentIndex + direction;
            
            if (newIndex >= 0 && newIndex < data.length) {
                currentIndex = newIndex;
                updateSlide();
                window.scrollTo(0, 0);
            }
        }

        // 跳转到第一页
        function jumpToFirst() {
            currentIndex = 0;
            updateSlide();
            window.scrollTo(0, 0);
        }

        // 跳转到最后一页
        function jumpToEnd() {
            currentIndex = knowledgeBase[currentSubject].length - 1;
            updateSlide();
            window.scrollTo(0, 0);
        }

        // 跳转到指定页
        function jumpToPage() {
            const input = document.getElementById('jumpInput');
            const pageNum = parseInt(input.value);
            const data = knowledgeBase[currentSubject];
            
            if (pageNum >= 1 && pageNum <= data.length) {
                currentIndex = pageNum - 1;
                updateSlide();
                window.scrollTo(0, 0);
            }
            
            input.value = '';
        }

        // 导出Markdown
        function exportMarkdown() {
            const data = knowledgeBase[currentSubject];
            if (!data || data.length === 0) return;

            let content = '# 知识点学习笔记\n\n';
            content += `> 年级：${gradeNames[currentGrade]}\n`;
            content += `> 科目：${subjectNames[currentSubject]}\n`;
            content += `> 导出时间：${new Date().toLocaleString('zh-CN')}\n\n`;
            content += '---\n\n';

            const item = data[currentIndex];
            content += `## ${item.title}\n\n`;
            
            // 提取纯文本内容
            const temp = document.createElement('div');
            temp.innerHTML = item.content;
            content += temp.textContent + '\n\n';

            const blob = new Blob([content], {type: 'text/markdown;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `知识点-${gradeNames[currentGrade]}-${subjectNames[currentSubject]}-${currentIndex + 1}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 切换答案显示
        function toggleAnswer(btn) {
            const answer = btn.nextElementSibling;
            answer.classList.toggle('show');
            btn.textContent = answer.classList.contains('show') ? '隐藏答案' : '查看答案';
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    navigate(-1);
                    break;
                case 'ArrowRight':
                    navigate(1);
                    break;
                case 'Home':
                    jumpToFirst();
                    break;
                case 'End':
                    jumpToEnd();
                    break;
                case 'Escape':
                    if (settingsVisible) toggleSettings();
                    break;
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);

        // 输出统计信息到控制台
        console.log('=== 知识点统计 ===');
        console.log('语文:', knowledgeBase.chinese.length, '个');
        console.log('数学:', knowledgeBase.math.length, '个');
        console.log('英语:', knowledgeBase.english.length, '个');
        console.log('历史:', knowledgeBase.history.length, '个');
        console.log('地理:', knowledgeBase.geography.length, '个');
        console.log('总计:', Object.values(knowledgeBase).reduce((a, b) => a + b.length, 0), '个');
    </script>
</body>
</html>
