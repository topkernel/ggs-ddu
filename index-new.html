        const gradeNames = {
            grade2: '2дё?,
            grade7a: '7дё?,
            grade7b: '7дё?,
            grade8a: '8дё?,
            grade8b: '8дё?
        };

        // еҲқе§ӢеҢ?
        function init() {
            updateSlide();
            updateSubjectOptions();
            
            // зӮ№еҮ»йЎөйқўе…¶д»–ең°ж–№е…ій—ӯи®ҫзҪ®йқўжқҝ
            document.addEventListener('click', (e) => {
                if (settingsVisible && 
                    !e.target.closest('.settings-panel') && 
                    !e.target.closest('.settings-btn')) {
                    toggleSettings();
                }
            });

            // и§Ұж‘ёж»‘еҠЁж”ҜжҢҒ
            const mainContent = document.getElementById('mainContent');
            
            mainContent.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            mainContent.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });
        }

        // жӣҙж–°з§‘зӣ®йҖүйЎ№
        function updateSubjectOptions() {
            const data = gradeData[currentGrade];
            const select = document.getElementById('subjectSelect');
            
            select.innerHTML = '';
            
            const subjects = [
                { key: 'chinese', icon: 'рҹ“–', name: 'иҜӯж–Ү' },
                { key: 'math', icon: 'рҹ”ў', name: 'ж•°еӯҰ' },
                { key: 'english', icon: 'рҹҮ¬рҹҮ§', name: 'иӢұиҜӯ' },
                { key: 'history', icon: 'рҹ“ң', name: 'еҺҶеҸІ' },
                { key: 'geography', icon: 'рҹҢҚ', name: 'ең°зҗҶ' }
            ];
            
            subjects.forEach(s => {
                const count = data[s.key] ? data[s.key].length : 0;
                const option = document.createElement('option');
                option.value = s.key;
                option.textContent = `${s.icon} ${s.name} (${count})`;
                if (count === 0) option.disabled = true;
                select.appendChild(option);
            });
            
            select.value = currentSubject;
        }

        // еӨ„зҗҶж»‘еҠЁ
        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    navigate(1);
                } else {
                    navigate(-1);
                }
            }
        }

        // еҲҮжҚўи®ҫзҪ®йқўжқҝ
        function toggleSettings() {
            settingsVisible = !settingsVisible;
            document.getElementById('settingsPanel').classList.toggle('show', settingsVisible);
        }

        // д»Һи®ҫзҪ®йқўжқҝж”№еҸҳе№ҙзә?
        function changeGrade() {
            currentGrade = document.getElementById('gradeSelect').value;
            currentSubject = 'chinese';
            currentIndex = 0;
            updateSubjectOptions();
            updateSlide();
            if (settingsVisible) toggleSettings();
            document.getElementById('mainContent').scrollTop = 0;
        }

        // д»Һи®ҫзҪ®йқўжқҝж”№еҸҳз§‘зӣ?
        function changeSubject() {
            currentSubject = document.getElementById('subjectSelect').value;
            currentIndex = 0;
            updateSlide();
            if (settingsVisible) toggleSettings();
            document.getElementById('mainContent').scrollTop = 0;
        }

        // жӣҙж–°е№»зҒҜзү?
        function updateSlide() {
            const data = gradeData[currentGrade][currentSubject];
            
            if (!data || data.length === 0) {
                document.getElementById('slideContent').innerHTML = `
                    <h3>жҡӮж— еҶ…е®№ <span class="tag basic">жҸҗзӨә</span></h3>
                    <p>иҜҘе№ҙзә§з§‘зӣ®зҡ„зҹҘиҜҶзӮ№жӯЈеңЁиЎҘе……дёӯ...</p>
                `;
                document.getElementById('statsText').textContent = 
                    `${gradeNames[currentGrade]} | ${subjectNames[currentSubject]} | 0/0`;
                document.getElementById('pageInfo').textContent = '0/0';
                return;
            }

            const item = data[currentIndex];
            
            // жӣҙж–°з»ҹи®ЎдҝЎжҒҜ
            document.getElementById('statsText').textContent = 
                `${gradeNames[currentGrade]} | ${subjectNames[currentSubject]} | ${currentIndex + 1}/${data.length}`;
            
            document.getElementById('pageInfo').textContent = 
                `${currentIndex + 1}/${data.length}`;
            
            document.getElementById('jumpInput').placeholder = currentIndex + 1;
            
            // жё…зҗҶеҶ…е®№е№¶жӣҙж–?
            const cleanHtml = cleanContent(item.content);
            document.getElementById('slideContent').innerHTML = `
                <h3>${item.title} <span class="tag ${item.tagClass}">${item.tag}</span></h3>
                ${cleanHtml}
            `;

            // жӣҙж–°жҢүй’®зҠ¶жҖ?
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex >= data.length - 1;
        }

        // еҜјиҲӘ
        function navigate(direction) {
            const data = gradeData[currentGrade][currentSubject];
            if (!data || data.length === 0) return;
            
            const newIndex = currentIndex + direction;
            
            if (newIndex >= 0 && newIndex < data.length) {
                currentIndex = newIndex;
                updateSlide();
                document.getElementById('mainContent').scrollTop = 0;
            }
        }

        // и·іиҪ¬еҲ°з¬¬дёҖйЎ?
        function jumpToFirst() {
            currentIndex = 0;
            updateSlide();
            document.getElementById('mainContent').scrollTop = 0;
        }

        // и·іиҪ¬еҲ°жңҖеҗҺдёҖйЎ?
        function jumpToEnd() {
            const data = gradeData[currentGrade][currentSubject];
            if (!data || data.length === 0) return;
            currentIndex = data.length - 1;
            updateSlide();
            document.getElementById('mainContent').scrollTop = 0;
        }

        // и·іиҪ¬еҲ°жҢҮе®ҡйЎө
        function jumpToPage() {
            const input = document.getElementById('jumpInput');
            const pageNum = parseInt(input.value);
            const data = gradeData[currentGrade][currentSubject];
            
            if (data && pageNum >= 1 && pageNum <= data.length) {
                currentIndex = pageNum - 1;
                updateSlide();
                document.getElementById('mainContent').scrollTop = 0;
            }
            
            input.value = '';
        }

        // еҜјеҮәMarkdown
        function exportMarkdown() {
            const data = gradeData[currentGrade][currentSubject];
            if (!data || data.length === 0) return;

            let content = '# зҹҘиҜҶзӮ№еӯҰд№ з¬”и®°\n\n';
            content += `> е№ҙзә§пј?{gradeNames[currentGrade]}\n`;
            content += `> з§‘зӣ®пј?{subjectNames[currentSubject]}\n`;
            content += `> еҜјеҮәж—¶й—ҙпј?{new Date().toLocaleString('zh-CN')}\n\n`;
            content += '---\n\n';

            const item = data[currentIndex];
            content += `## ${item.title}\n\n`;
            
            const temp = document.createElement('div');
            temp.innerHTML = cleanContent(item.content);
            content += temp.textContent + '\n\n';

            const blob = new Blob([content], {type: 'text/markdown;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `зҹҘиҜҶзӮ?${gradeNames[currentGrade]}-${subjectNames[currentSubject]}-${currentIndex + 1}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // еҲҮжҚўзӯ”жЎҲжҳҫзӨә
        function toggleAnswer(btn) {
            const answer = btn.nextElementSibling;
            answer.classList.toggle('show');
            btn.textContent = answer.classList.contains('show') ? 'йҡҗи—Ҹзӯ”жЎҲ' : 'жҹҘзңӢзӯ”жЎҲ';
        }

        // й”®зӣҳеҜјиҲӘ
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    navigate(-1);
                    break;
                case 'ArrowRight':
                    navigate(1);
                    break;
                case 'Home':
                    jumpToFirst();
                    break;
                case 'End':
                    jumpToEnd();
                    break;
                case 'Escape':
                    if (settingsVisible) toggleSettings();
                    break;
            }
        });

        // йЎөйқўеҠ иҪҪе®ҢжҲҗеҗҺеҲқе§ӢеҢ–
        document.addEventListener('DOMContentLoaded', init);

        // иҫ“еҮәз»ҹи®ЎдҝЎжҒҜеҲ°жҺ§еҲ¶еҸ°
        console.log('=== зҹҘиҜҶзӮ№з»ҹи®?===');
        for (let grade in gradeData) {
            console.log(`\n${gradeNames[grade]}:`);
            for (let subject in gradeData[grade]) {
                const count = gradeData[grade][subject].length;
                if (count > 0) {
                    console.log(`  ${subjectNames[subject]}: ${count}дёӘ`);
                }
            }
        }
    </script>
</body>
</html>
